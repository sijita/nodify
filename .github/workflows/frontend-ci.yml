name: frontend-ci

on:
  push:
    paths: ["src/**", "package.json", "package-lock.json", "*.config.ts", "tsconfig*.json", "biome.json", ".github/workflows/frontend-ci.yml"]
  pull_request:
    paths: ["src/**", "package.json", "package-lock.json", "*.config.ts", "tsconfig*.json", "biome.json", ".github/workflows/frontend-ci.yml"]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - name: lint
        run: npm run lint
      - name: typecheck
        run: npx tsc --noEmit
      - name: build
        run: npx vite build
