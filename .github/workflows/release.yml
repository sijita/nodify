name: release

# Compila instaladores para macOS (Apple Silicon + Intel), Windows y Linux y los
# publica en una GitHub Release. Se dispara al empujar un tag `v*` (p.ej. v0.1.0).
on:
  push:
    tags: ["v*"]
  workflow_dispatch: {} # permite lanzarlo a mano desde la pestaña Actions

permissions:
  contents: write # necesario para crear la Release y subir los binarios

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest # Apple Silicon (M1+)
            args: "--target aarch64-apple-darwin"
          - platform: macos-latest # Intel
            args: "--target x86_64-apple-darwin"
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Instalar dependencias del sistema (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            libssl-dev

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          # En macOS instala ambos targets para poder compilar arm64 e Intel.
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Instalar dependencias del frontend
        run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || 'app-v__VERSION__' }}
          releaseName: "Nodify v__VERSION__"
          releaseBody: "Descarga el instalador para tu sistema operativo abajo (Assets)."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
